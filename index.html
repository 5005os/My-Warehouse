<script type="module">
  import PocketBase from 'https://cdn.jsdelivr.net/npm/pocketbase@0.21.0/+esm';

  // --- НАСТРОЙКИ ТВОЕГО СЕРВЕРА ---
  const CONFIG = {
    url: 'http://153.80.184.76:8090', // Адрес твоего сервера
  };

  const pb = new PocketBase(CONFIG.url);
  
  /* ---------- Пользователи ---------- */
  const USERS=[
    {login:'Аза',     pass:'909010'},
    {login:'Николай', pass:'Цой2026'},
    {login:'Юлия',    pass:'Склад1'},
  ];
  let currentUser=null;

  /* ---------- Хранилище ---------- */
  const KEY='sklad_v3', CKEY='sklad_chat_v2', UKEY='sklad_user';
  let mem=null;
  function load(){
    if(mem) return mem;
    try{const r=localStorage.getItem(KEY);mem=r?JSON.parse(r):null;}catch(e){mem=null;}
    if(!mem) mem=seed();
    return mem;
  }
  
  let cloudOn=false;
  let warehouseDocId = null; // ID документа в базе

  function saveLocal(){try{localStorage.setItem(KEY,JSON.stringify(mem));}catch(e){}}
  
  async function save(){ 
    saveLocal(); 
    if(cloudOn) await cloudPush(); 
  }

  function setStatus(txt,color){ const s=document.getElementById('appsub'); if(s){ s.textContent=txt; s.style.color=color||''; } }
  function cloudError(msg){ setStatus('⚠ '+msg, '#ff8c8c'); }

  const APP_VERSION='v9-HOME-SERVER';
  let diagResults=null, diagRunning=false;

  async function runDiag(){
    diagRunning=true; renderHome();
    const r=[]; const push=(name,ok,detail)=>r.push({name,ok,detail:detail||''});
    
    push('Сервер доступен', true, CONFIG.url);
    
    if(!cloudOn){ 
        push('Подключение к БД', false, 'Сервер не отвечает'); 
        diagResults=r; diagRunning=false; renderHome(); return; 
    }
    
    push('Подключение к БД', true);
    try{ 
        const list = await pb.collection('warehouse').getList(1,1);
        push('Чтение склада', true); 
        if(list.items.length > 0) warehouseDocId = list.items[0].id;
    }
    catch(e){ push('Чтение склада', false, e.message); }
    
    diagResults=r; diagRunning=false; renderHome();
  }

  async function cloudPush(){
    if(!cloudOn || !warehouseDocId) return;
    try{ 
        await pb.collection('warehouse').update(warehouseDocId, {
            data: JSON.stringify(db),
            updated_at: new Date().toISOString()
        });
    }
    catch(e){ cloudError('сохранение — '+(e.message||e)); }
  }

  async function cloudLoadWarehouse(){
    try{
        const list = await pb.collection('warehouse').getList(1,1);
        if(list.items.length > 0){
            const doc = list.items[0];
            warehouseDocId = doc.id;
            const remoteData = JSON.parse(doc.data || '{}');
            
            // Обновляем локальные данные, если они новее или их нет
            db.products = remoteData.products || [];
            db.returns = remoteData.returns || [];
            db.shipments = remoteData.shipments || [];
            
            saveLocal(); 
            render();
            setStatus('● общий доступ (Домашний сервер)', '#6ee7a0');
        } else {
            // Если база пустая, создаем первый документ
            const newDoc = await pb.collection('warehouse').create({
                data: JSON.stringify(db),
                updated_at: new Date().toISOString()
            });
            warehouseDocId = newDoc.id;
            setStatus('● общий доступ (Новая база)', '#6ee7a0');
        }
        cloudOn = true;
    }catch(e){ cloudError('склад — '+(e.message||e)); }
  }

  function seed(){ return { products:[], returns:[], shipments:[] }; }
  function id(){return Math.random().toString(36).slice(2,10)}
  const db=load();

  let chatMsgs=[];
  function loadChat(){try{const r=localStorage.getItem(CKEY);chatMsgs=r?JSON.parse(r):[];}catch(e){chatMsgs=[];}}
  function saveChat(){try{localStorage.setItem(CKEY,JSON.stringify(chatMsgs));}catch(e){}}
  loadChat();

  /* ---------- helpers ---------- */
  const $=s=>document.querySelector(s);
  const esc=s=>(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
  const sum=(a,f)=>a.reduce((t,x)=>t+(+f(x)||0),0);
  const num=v=>{const n=parseFloat((v||'').toString().replace(',','.').trim());return isNaN(n)?0:n;};
  function fmtKg(v){return (Math.round(v*1000)/1000).toLocaleString('ru-RU');}
  function bc(){return '<span class="bc"><i></i><i></i><i></i><i></i><i></i><i></i></span>'}
  function fmtDate(t){const d=new Date(t);return d.toLocaleDateString('ru-RU',{day:'2-digit',month:'short'})+' '+d.toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'})}
  function fmtTime(t){return new Date(t).toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'})}
  function fmtSize(b){b=+b||0;if(b<1024)return b+' Б';if(b<1048576)return Math.round(b/1024)+' КБ';return (b/1048576).toFixed(1)+' МБ';}
  function fmtDateOnly(d){if(!d)return '';const p=(''+d).split('-');return p.length===3?`${p[2]}.${p[1]}.${p[0]}`:d;}
  
  function fileEmoji(t,n){t=t||'';n=(n||'').toLowerCase();if(/sheet|excel|xls|csv/.test(t)||/\.(xls|xlsx|csv)$/.test(n))return 'XLS';if(/word|document|msword|\.doc/.test(t)||/\.(doc|docx)$/.test(n))return 'DOC';if(/pdf/.test(t)||/\.pdf$/.test(n))return 'PDF';if(/\.(zip|rar|7z)$/.test(n))return 'ZIP';return 'ФАЙЛ';}
  
  async function compressToBlob(file,max,q){
    let bmp;
    try{ bmp=await createImageBitmap(file,{imageOrientation:'from-image'}); }
    catch(e){ bmp=await new Promise((res,rej)=>{const i=new Image();i.onload=()=>res(i);i.onerror=rej;const fr=new FileReader();fr.onload=ev=>i.src=ev.target.result;fr.onerror=rej;fr.readAsDataURL(file);}); }
    let w=bmp.width,h=bmp.height;
    if(w>h){ if(w>max){h=Math.round(h*max/w);w=max;} } else { if(h>max){w=Math.round(w*max/h);h=max;} }
    const c=document.createElement('canvas');c.width=w;c.height=h;
    c.getContext('2d').drawImage(bmp,0,0,w,h);
    return await new Promise(r=>c.toBlob(r,'image/jpeg',q));
  }
  function fmtDay(t){return new Date(t).toLocaleDateString('ru-RU',{day:'2-digit',month:'long'})}
  function photoIcon(s){s=s||30;return `<svg viewBox="0 0 24 24" width="${s}" height="${s}" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M4 8h3l1.5-2h7L17 8h3a1 1 0 0 1 1 1v9a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9a1 1 0 0 1 1-1Z"/><circle cx="12" cy="13" r="3.2"/></svg>`}
  async function compressImage(file,max,q){
    let bmp;
    try{ bmp=await createImageBitmap(file,{imageOrientation:'from-image'}); }
    catch(e){ bmp=await new Promise((res,rej)=>{const i=new Image();i.onload=()=>res(i);i.onerror=rej;const fr=new FileReader();fr.onload=ev=>i.src=ev.target.result;fr.onerror=rej;fr.readAsDataURL(file);}); }
    let w=bmp.width,h=bmp.height;
    if(w>h){ if(w>max){h=Math.round(h*max/w);w=max;} } else { if(h>max){w=Math.round(w*max/h);h=max;} }
    const c=document.createElement('canvas');c.width=w;c.height=h;
    c.getContext('2d').drawImage(bmp,0,0,w,h);
    return c.toDataURL('image/jpeg',q);
  }
  function adjustStock(item,sign){
    const p=db.products.find(x=>(item.barcode&&x.barcode===item.barcode)||x.name===item.name);
    if(p) p.qty=Math.max(0,(+p.qty||0)+sign*(+item.qty||0));
  }

  const ST={ repair:{c:'p-repair',t:'На ремонт'}, done:{c:'p-done',t:'После ремонта'}, parts:{c:'p-parts',t:'В запчасти'} };

  /* ---------- Вход ---------- */
  function showLogin(){ $('#login').classList.remove('hide'); }
  function doLogin(){
    const l=$('#lg-login').value.trim(), p=$('#lg-pass').value;
    const u=USERS.find(x=>x.login.toLowerCase()===l.toLowerCase()&&x.pass===p);
    if(!u){ $('#lg-err').textContent='Неверный логин или пароль'; return; }
    currentUser={login:u.login};
    try{localStorage.setItem(UKEY,JSON.stringify(currentUser));}catch(e){}
    $('#lg-err').textContent=''; $('#lg-pass').value='';
    $('#login').classList.add('hide');
    $('#avatarBtn').textContent=currentUser.login[0].toUpperCase();
    render();
  }
  $('#lg-btn').onclick=doLogin;
  $('#lg-pass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()});
  $('#avatarBtn').onclick=()=>{
    if(!currentUser)return;
    if(confirm('Выйти из аккаунта «'+currentUser.login+'»?')){
      currentUser=null; try{localStorage.removeItem(UKEY);}catch(e){}
      showLogin();
    }
  };
  try{const u=localStorage.getItem(UKEY);if(u){currentUser=JSON.parse(u);$('#login').classList.add('hide');$('#avatarBtn').textContent=currentUser.login[0].toUpperCase();}}catch(e){}

  /* ---------- Навигация ---------- */
  let tab='home';
  const addFor={ship:'Фура'};
  document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>switchTab(b.dataset.tab));
  function switchTab(t){
    tab=t;
    document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('on',x.dataset.tab===t));
    document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
    $('#view-'+t).classList.add('active');
    const a=addFor[t];
    $('#addBtn').style.display=a?'inline-flex':'none';
    if(a)$('#addLabel').textContent=a;
    $('#chatInput').classList.toggle('show',t==='chat');
    window.scrollTo(0,0);
    render();
    if(t==='chat') scrollChat();
  }
  $('#addBtn').onclick=()=>{ if(tab==='ship')openShip(); };

  /* ---------- Рендер ---------- */
  let goodsQuery='', retFilter='all';
  function render(){ renderHome(); renderGoods(); renderReturns(); renderShip(); renderChat(); renderBadges(); }

  function renderBadges(){
    const ar=sum(db.returns.filter(r=>r.status==='repair'),r=>r.qty);
    const br=$('#badge-returns'); br.style.display=ar?'flex':'none'; br.textContent=ar;
    const as=db.shipments.filter(s=>s.status==='assembling').length;
    const bsh=$('#badge-ship'); bsh.style.display=as?'flex':'none'; bsh.textContent=as;
  }

  function renderHome(){
    const p=db.products;
    const stock=sum(p,x=>x.qty);
    const weight=sum(p,x=>(+x.qty||0)*(+x.weight||0));
    const onRepair=sum(db.returns.filter(r=>r.status==='repair'),r=>r.qty);
    const afterRepair=sum(db.returns.filter(r=>r.status==='done'),r=>r.qty);
    const parts=sum(db.returns.filter(r=>r.status==='parts'),r=>r.qty);
    const assembling=db.shipments.filter(s=>s.status==='assembling').length;
    const ready=db.shipments.filter(s=>s.status==='ready').length;
    $('#view-home').innerHTML=`
      <div class="srv">
        <div class="srv-top">
          <div class="srv-t">Сервер ${cloudOn?'✓':'—'} <span class="srv-v">${APP_VERSION}</span></div>
          <button class="srv-btn" id="diagBtn">${diagRunning?'Проверяю…':'Проверить'}</button>
        </div>
        ${diagResults?('<div class="srv-list">'+diagResults.map(x=>`<div class="srv-row"><span class="srv-ic ${x.ok?'ok':'no'}">${x.ok?'✓':'✕'}</span><span class="srv-n">${esc(x.name)}${x.detail?`<small>${esc(x.detail)}</small>`:''}</span></div>`).join('')+'</div>'):'<div class="srv-hint">Нажми «Проверить» — покажет, что работает, а что нет.</div>'}
      </div>
      <div class="grid">
        <div class="stat"><div class="num mono">${stock}</div><div class="lab">Всего на складе, шт · ${p.length} наимен.</div></div>
        <div class="stat"><div class="num mono">${fmtKg(weight)}</div><div class="lab">Общий вес, кг</div></div>
      </div>
      <div class="section-h">Возвраты и ремонт</div>
      <div class="grid">
        <div class="stat"><span class="tag" style="background:var(--purple)"></span><div class="num mono">${onRepair}</div><div class="lab">На ремонт</div></div>
        <div class="stat"><span class="tag" style="background:var(--green)"></span><div class="num mono">${afterRepair}</div><div class="lab">После ремонта</div></div>
        <div class="stat"><span class="tag" style="background:var(--slate)"></span><div class="num mono">${parts}</div><div class="lab">В запчасти</div></div>
        <div class="stat"><span class="tag" style="background:var(--red)"></span><div class="num mono">${db.returns.length}</div><div class="lab">Всего возвратов</div></div>
      </div>
      <div class="section-h">Поставки (фуры)</div>
      <div class="grid">
        <div class="stat"><span class="tag" style="background:var(--amber)"></span><div class="num mono">${assembling}</div><div class="lab">На сборке</div></div>
        <div class="stat"><span class="tag" style="background:var(--green)"></span><div class="num mono">${ready}</div><div class="lab">Готовы к отправке</div></div>
      </div>
    `;
    const db2=document.getElementById('diagBtn'); if(db2)db2.onclick=runDiag;
  }

  function renderGoods(){
    const q=goodsQuery.trim().toLowerCase();
    const list=db.products.filter(p=>!q||p.name.toLowerCase().includes(q)||p.barcode.includes(q));
    const v=$('#view-goods');
    v.innerHTML=`
      <div class="actions">
        <button class="ab primary" id="g-create">＋ Создать товар</button>
        <button class="ab" id="g-add">＋ Добавить товар</button>
      </div>
      <div class="search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5" stroke-linecap="round"/></svg>
        <input id="gsearch" placeholder="Поиск по названию или штрих-коду" value="${esc(goodsQuery)}" inputmode="search">
      </div>
      ${list.length?list.map(p=>`
        <div class="card">
          <div class="top">
            <div style="display:flex;gap:12px;align-items:flex-start">
              ${p.photo?`<img class="thumb" src="${p.photo}" alt="">`:`<div class="thumb ph">${photoIcon(22)}</div>`}
              <div>
                <div class="name">${esc(p.name)}</div>
                <div class="code">${bc()}<span class="mono">${esc(p.barcode)||'без кода'}</span>${p.weight?` · <span class="mono">${fmtKg(p.weight)} кг/шт</span>`:''}</div>
              </div>
            </div>
          </div>
          <div class="counts">
            <div class="chip k0"><div class="v mono">${p.qty}</div><div class="k">На складе, шт</div></div>
            ${p.weight?`<div class="chip b"><div class="v mono">${fmtKg((+p.qty||0)*(+p.weight||0))}</div><div class="k">Общий вес, кг</div></div>`:''}
          </div>
          <div class="row-actions">
            <button class="mini" data-edit="${p.id}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>Изменить</button>
            <button class="mini danger" data-del="${p.id}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4h8v2M6 6l1 14h10l1-14"/></svg>Удалить</button>
          </div>
        </div>`).join(''):emptyState('package',q?'Ничего не найдено':'Товаров пока нет',q?'Измените запрос поиска.':'Нажмите «Товар» вверху, чтобы добавить позицию.')}
    `;
    const s=$('#gsearch'); s.oninput=e=>{goodsQuery=e.target.value;const pos=e.target.selectionStart;renderGoods();const ns=$('#gsearch');ns.focus();ns.setSelectionRange(pos,pos);};
    $('#g-create').onclick=()=>openProduct();
    $('#g-add').onclick=()=>openAddStock();
    v.querySelectorAll('[data-edit]').forEach(b=>b.onclick=()=>openProduct(b.dataset.edit));
    v.querySelectorAll('[data-del]').forEach(b=>b.onclick=()=>{ if(confirm('Удалить товар?')){db.products=db.products.filter(x=>x.id!==b.dataset.del);save();render();} });
  }

  function renderReturns(){
    const f=retFilter;
    const list=db.returns.filter(r=>f==='all'||r.status===f).sort((a,b)=>b.date-a.date);
    const cnt=s=>db.returns.filter(r=>r.status===s).length;
    const v=$('#view-returns');
    v.innerHTML=`
      <div class="actions">
        <button class="ab primary" id="rc-create">＋ Создать возврат</button>
        <button class="ab" id="rc-add">＋ Добавить возврат</button>
      </div>
      <div class="filters">
        ${[['all','Все',db.returns.length],['repair','На ремонт',cnt('repair')],['done','После ремонта',cnt('done')],['parts','Запчасти',cnt('parts')]]
          .map(([k,t,n])=>`<button class="fchip ${f===k?'on':''}" data-f="${k}">${t}${n?' · '+n:''}</button>`).join('')}
      </div>
      ${list.length?list.map(r=>{const st=ST[r.status];return `
        <div class="card">
          <div class="top">
            <div>
              <div class="name">${esc(r.name)}</div>
              <div class="code">${bc()}<span class="mono">${esc(r.barcode)||'без кода'}</span> · <span class="mono">${r.qty} шт</span>${r.weight?` · <span class="mono">${fmtKg((+r.qty||0)*(+r.weight||0))} кг</span>`:''}</div>
            </div>
            <span class="pill ${st.c}">${st.t}</span>
          </div>
          <div class="ship-meta"><span>${fmtDate(r.date)}</span></div>
          <div class="row-actions">
            ${nextActions(r)}
            <button class="mini" data-edit="${r.id}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg></button>
            <button class="mini danger" data-del="${r.id}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4h8v2M6 6l1 14h10l1-14"/></svg></button>
          </div>
        </div>`}).join(''):emptyState('return',f==='all'?'Возвратов нет':'Здесь пусто',f==='all'?'Нажмите «Возврат» вверху, чтобы оформить возврат.':'Нет позиций с этим статусом.')}
    `;
    v.querySelectorAll('[data-f]').forEach(b=>b.onclick=()=>{retFilter=b.dataset.f;renderReturns();});
    $('#rc-create').onclick=()=>openReturn();
    $('#rc-add').onclick=()=>openPickForReturn();
    v.querySelectorAll('[data-edit]').forEach(b=>b.onclick=()=>openReturn(b.dataset.edit));
    v.querySelectorAll('[data-del]').forEach(b=>b.onclick=()=>{ if(confirm('Удалить возврат?')){db.returns=db.returns.filter(x=>x.id!==b.dataset.del);save();render();} });
    v.querySelectorAll('[data-set]').forEach(b=>b.onclick=()=>{const r=db.returns.find(x=>x.id===b.dataset.id);if(r){r.status=b.dataset.set;save();render();}});
  }
  function nextActions(r){
    const btn=(st,label,color)=>`<button class="mini" data-id="${r.id}" data-set="${st}" style="color:${color};border-color:${color}33">${label}</button>`;
    if(r.status==='repair') return btn('done','Готов','var(--green)')+btn('parts','В запчасти','var(--slate)');
    if(r.status==='done')   return btn('repair','Вернуть в ремонт','var(--purple)');
    if(r.status==='parts')  return btn('repair','Вернуть в ремонт','var(--purple)');
    return '';
  }

  function renderShip(){
    const list=[...db.shipments].sort((a,b)=>b.date-a.date);
    const v=$('#view-ship');
    v.innerHTML= list.length?list.map(s=>{
      const total=sum(s.items,i=>i.qty), ready=s.status==='ready';
      const totalW=sum(s.items,i=>(+i.qty||0)*(+i.weight||0));
      return `
      <div class="card">
        <div class="top">
          <div>
            <div class="name">Фура → ${esc(s.city)||'город не указан'}</div>
            <div class="code"><span class="mono">${esc(s.truck)||'номер не указан'}</span>${s.driver?' · '+esc(s.driver):''}</div>
          </div>
          <span class="pill ${ready?'p-ready':'p-assemble'}">${ready?'Готова':'На сборке'}</span>
        </div>
        <div class="counts">
          <div class="chip k0"><div class="v mono">${total}</div><div class="k">Единиц</div></div>
          <div class="chip b"><div class="v mono">${s.items.length}</div><div class="k">Позиций</div></div>
          ${totalW>0?`<div class="chip"><div class="v mono" style="color:var(--accent-d)">${fmtKg(totalW)}</div><div class="k">Вес фуры, кг</div></div>`:''}
        </div>
        ${s.items.length?'<div style="margin-top:12px">'+s.items.map(i=>`<div class="ship-item"><span class="nm">${esc(i.name)}<small>ШК: ${esc(i.barcode)||'—'}${i.weight?' · '+fmtKg((+i.qty||0)*(+i.weight||0))+' кг':''}</small></span><span class="q mono">${i.qty} шт</span></div>`).join('')+'</div>':''}
        <div class="ship-meta">${s.depart?`<span>Уходит: <b>${fmtDateOnly(s.depart)}</b></span>`:''}<span>Создана ${fmtDate(s.date)}</span></div>
        <div class="row-actions">
          <button class="mini" data-toggle="${s.id}" style="color:${ready?'var(--amber)':'var(--green)'};border-color:${ready?'var(--amber)':'var(--green)'}33">${ready?'Вернуть на сборку':'Отметить готовой'}</button>
          <button class="mini" data-edit="${s.id}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg></button>
          <button class="mini danger" data-del="${s.id}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4h8v2M6 6l1 14h10l1-14"/></svg></button>
        </div>
      </div>`}).join('') : emptyState('truck','Поставок нет','Нажмите «Фура» вверху: укажите город, номер машины и собери список товаров. Кол-во спишется со склада.');
    v.querySelectorAll('[data-toggle]').forEach(b=>b.onclick=()=>{const s=db.shipments.find(x=>x.id===b.dataset.toggle);s.status=s.status==='ready'?'assembling':'ready';save();render();});
    v.querySelectorAll('[data-edit]').forEach(b=>b.onclick=()=>openShip(b.dataset.edit));
    v.querySelectorAll('[data-del]').forEach(b=>b.onclick=()=>{ const s=db.shipments.find(x=>x.id===b.dataset.del); if(s&&confirm('Удалить поставку? Товары вернутся на склад.')){s.items.forEach(it=>adjustStock(it,1));db.shipments=db.shipments.filter(x=>x.id!==b.dataset.del);save();render();} });
  }

  function emptyState(icon,t,d){
    const ic={
      package:'<path d="M3 7.5 12 3l9 4.5v9L12 21 3 16.5v-9Z" stroke-linejoin="round"/><path d="m3 7.5 9 4.5 9-4.5M12 12v9" stroke-linejoin="round"/>',
      return:'<path d="M9 14 4 9l5-5"/><path d="M4 9h11a5 5 0 0 1 0 10h-3"/>',
      truck:'<path d="M1 6h12v9H1zM13 9h4l3 3v3h-7z"/><circle cx="6" cy="18" r="1.6"/><circle cx="17" cy="18" r="1.6"/>'
    }[icon];
    return `<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">${ic}</svg><div class="t">${t}</div><div class="d">${d}</div></div>`;
  }

  /* ---------- Чат ---------- */
  function renderChat(){
    const v=$('#view-chat');
    const banner = cloudOn ? '' :
      `<div class="chat-banner">Чат сейчас работает только на этом устройстве. Сервер не подключен.</div>`;
    let html=banner+'<div class="chat-list">';
    let lastDay='';
    if(!chatMsgs.length){ html+='<div class="empty" style="padding:30px 10px"><div class="d">Сообщений пока нет. Напишите первое 👋</div></div>'; }
    chatMsgs.forEach(m=>{
      const day=fmtDay(m.ts);
      if(day!==lastDay){ html+=`<div class="day">${day}</div>`; lastDay=day; }
      const me=currentUser&&m.user===currentUser.login;
      let body='';
      if(m.fileUrl){
        if((m.fileType||'').startsWith('image/')){ body=`<a href="${m.fileUrl}" target="_blank" rel="noopener"><img class="msg-img" src="${m.fileUrl}" alt=""></a>`; }
        else{ body=`<a class="file-card" href="${m.fileUrl}" target="_blank" rel="noopener" download="${esc(m.fileName||'file')}"><span class="fi">${fileEmoji(m.fileType,m.fileName)}</span><span><span class="fn">${esc(m.fileName||'Файл')}</span><span class="fs">${fmtSize(m.fileSize)} · открыть</span></span></a>`; }
      }
      if(m.text){ body+=`<div${m.fileUrl?' style="margin-top:6px"':''}>${esc(m.text)}</div>`; }
      html+=`<div class="msg ${me?'me':'them'}">${me?'':`<div class="who">${esc(m.user)}</div>`}${body}<div class="tm">${fmtTime(m.ts)}</div></div>`;
    });
    html+='</div>';
    v.innerHTML=html;
  }
  function scrollChat(){ setTimeout(()=>window.scrollTo(0,document.body.scrollHeight),60); }
  
  async function sendMsg(){
    const f=$('#chatField'); const text=f.value.trim(); if(!text||!currentUser)return;
    f.value='';
    if(cloudOn){
      try{ 
        await pb.collection('messages').create({
            login: currentUser.login,
            text: text,
            created_at: new Date().toISOString()
        });
        loadChatFromCloud(); // Обновляем чат
      }catch(e){ alert('Не удалось отправить'); }
    }else{
      chatMsgs.push({id:id(),user:currentUser.login,text,ts:Date.now()});
      saveChat(); renderChat(); scrollChat();
    }
  }
  
  async function loadChatFromCloud(){
      if(!cloudOn) return;
      try{
          const list = await pb.collection('messages').getList(1, 100, { sort: '-created_at' });
          chatMsgs = list.items.map(item => ({
              id: item.id,
              user: item.login,
              text: item.text,
              ts: new Date(item.created_at).getTime(),
              fileUrl: item.file_url || '',
              fileName: '',
              fileType: '',
              fileSize: 0
          })).reverse();
          renderChat();
          if(tab==='chat') scrollChat();
      }catch(e){}
  }

  $('#chatSend').onclick=sendMsg;
  $('#chatField').addEventListener('keydown',e=>{if(e.key==='Enter')sendMsg()});
  
  // Загрузка чата при старте
  if(cloudOn) loadChatFromCloud();

  /* ---------- Модалки ---------- */
  const overlay=$('#overlay'), sheet=$('#sheet');
  function openSheet(html){ sheet.innerHTML='<div class="grab"></div>'+html; overlay.classList.add('show'); document.body.style.overflow='hidden'; }
  function closeSheet(){ overlay.classList.remove('show'); document.body.style.overflow=''; }
  overlay.onclick=e=>{ if(e.target===overlay)closeSheet(); };

  function openGoodsMenu(){
    openSheet(`
      <h2>Добавить товар</h2>
      <button class="opt primary" id="m-create"><div class="ot">Создать новый товар</div><div class="od">Название, вес 1 шт и количество</div></button>
      <button class="opt" id="m-add"><div class="ot">Добавить к существующему</div><div class="od">Выбрать товар из списка и докинуть штук</div></button>
    `);
    $('#m-create').onclick=()=>openProduct();
    $('#m-add').onclick=()=>openAddStock();
  }
  function openAddStock(){
    if(!db.products.length){
      openSheet(`<h2>Добавить на склад</h2><div class="empty" style="padding:24px 8px"><div class="d">Сначала создайте товар.</div></div><button class="save" id="m-create2">Создать товар</button>`);
      $('#m-create2').onclick=()=>openProduct(); return;
    }
    openSheet(`
      <h2>Добавить на склад</h2>
      <div class="search" style="margin-top:4px"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5" stroke-linecap="round"/></svg><input id="as-q" placeholder="Поиск товара" inputmode="search"></div>
      <div id="as-list"></div>
    `);
    function drawList(q){
      q=(q||'').trim().toLowerCase();
      const list=db.products.filter(p=>!q||p.name.toLowerCase().includes(q)||p.barcode.includes(q));
      $('#as-list').innerHTML=list.length?list.map(p=>`
        <button class="opt" data-pick="${p.id}"><div class="ot">${esc(p.name)}</div><div class="od">На складе: ${p.qty} шт${p.weight?' · '+fmtKg(p.weight)+' кг/шт':''}</div></button>
      `).join(''):'<div class="empty" style="padding:20px"><div class="d">Ничего не найдено</div></div>';
      $('#as-list').querySelectorAll('[data-pick]').forEach(b=>b.onclick=()=>openAddQty(b.dataset.pick));
    }
    drawList();
    $('#as-q').oninput=e=>drawList(e.target.value);
  }
  function openAddQty(pid){
    const p=db.products.find(x=>x.id===pid); if(!p)return;
    openSheet(`
      <h2>Добавить на склад</h2>
      <div style="font-weight:700;font-size:17px;margin-bottom:2px">${esc(p.name)}</div>
      <div style="color:var(--soft);font-size:13px">Сейчас на складе: ${p.qty} шт</div>
      <label class="fl">Сколько добавить, шт</label>
      <input class="inp mono" id="aq-n" inputmode="numeric" value="1">
      <button class="save" id="aq-save">Добавить</button>
    `);
    $('#aq-save').onclick=()=>{
      const n=+$('#aq-n').value||0; if(n<=0)return alert('Укажите количество');
      p.qty=(+p.qty||0)+n; save(); closeSheet();
      if(tab!=='goods')switchTab('goods'); else render();
    };
  }

  function openProduct(pid){
    const p=pid?db.products.find(x=>x.id===pid):null;
    let photo=p?(p.photo||''):'';
    openSheet(`
      <h2>${p?'Изменить товар':'Новый товар'}</h2>
      <div class="photo-row">
        <label for="f-photo" class="photo-box" id="f-pbox">${photo?`<img src="${photo}" alt="">`:photoIcon(34)}</label>
        <div class="photo-info">
          <div class="pi-t">Фото товара</div>
          <div class="pi-d">Нажмите, чтобы снять на камеру<br>или выбрать из галереи</div>
          <button type="button" class="mini" id="f-prm" style="display:${photo?'flex':'none'};max-width:150px;margin-top:9px;border-color:#FAD2DA;color:var(--red)">Удалить фото</button>
        </div>
      </div>
      <input type="file" id="f-photo" accept="image/*" hidden>
      <label class="fl">Название</label>
      <input class="inp" id="f-name" value="${p?esc(p.name):''}" placeholder="Напр. Наушники TWS Pro">
      <label class="fl">Штрих-код</label>
      <input class="inp mono" id="f-bc" inputmode="numeric" value="${p?esc(p.barcode):''}" placeholder="4600000000000">
      <div class="two">
        <div><label class="fl">Вес 1 шт, кг</label><input class="inp mono" id="f-w" inputmode="decimal" value="${p&&p.weight?fmtKg(p.weight):''}" placeholder="0,2"></div>
        <div><label class="fl">Количество, шт</label><input class="inp mono" id="f-qty" inputmode="numeric" value="${p?p.qty:0}"></div>
      </div>
      <div id="f-total" style="font-size:13.5px;color:var(--soft);font-weight:600;margin-top:11px"></div>
      <button class="save" id="f-save">${p?'Сохранить':'Создать товар'}</button>
    `);
    const pbox=$('#f-pbox'), prm=$('#f-prm');
    $('#f-photo').onchange=async e=>{
      const file=e.target.files[0]; if(!file)return;
      pbox.innerHTML='<span class="pi-load">Сжимаю…</span>';
      try{ photo=await compressImage(file,420,0.62); pbox.innerHTML=`<img src="${photo}" alt="">`; prm.style.display='flex'; }
      catch(err){ pbox.innerHTML=photoIcon(34); alert('Не удалось загрузить фото'); }
    };
    prm.onclick=()=>{ photo=''; pbox.innerHTML=photoIcon(34); prm.style.display='none'; $('#f-photo').value=''; };
    const updTotal=()=>{const w=num($('#f-w').value),q=+$('#f-qty').value||0;$('#f-total').textContent=(w>0&&q>0)?`Общий вес: ${fmtKg(w*q)} кг  ·  ${q} шт × ${fmtKg(w)} кг`:'';};
    $('#f-w').oninput=updTotal; $('#f-qty').oninput=updTotal; updTotal();
    $('#f-save').onclick=()=>{
      const name=$('#f-name').value.trim(); if(!name)return alert('Укажите название');
      const o={name,barcode:$('#f-bc').value.trim(),weight:num($('#f-w').value),qty:+$('#f-qty').value||0,photo};
      if(p)Object.assign(p,o); else db.products.unshift({id:id(),...o});
      save();closeSheet();render();
    };
  }

  function openPickForReturn(){
    if(!db.products.length){ openReturn(); return; }
    openSheet(`
      <h2>Добавить возврат</h2>
      <div class="search" style="margin-top:4px"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5" stroke-linecap="round"/></svg><input id="pr-q" placeholder="Поиск товара" inputmode="search"></div>
      <div id="pr-list"></div>
    `);
    function drawList(q){
      q=(q||'').trim().toLowerCase();
      const list=db.products.filter(p=>!q||p.name.toLowerCase().includes(q)||p.barcode.includes(q));
      $('#pr-list').innerHTML=list.length?list.map(p=>`<button class="opt" data-pick="${p.id}"><div class="ot">${esc(p.name)}</div><div class="od">${esc(p.barcode)||'без кода'}${p.weight?' · '+fmtKg(p.weight)+' кг/шт':''}</div></button>`).join(''):'<div class="empty" style="padding:20px"><div class="d">Ничего не найдено</div></div>';
      $('#pr-list').querySelectorAll('[data-pick]').forEach(b=>b.onclick=()=>{const p=db.products.find(x=>x.id===b.dataset.pick);openReturn(null,{name:p.name,barcode:p.barcode,weight:p.weight});});
    }
    drawList();
    $('#pr-q').oninput=e=>drawList(e.target.value);
  }

  function openReturn(rid,prefill){
    const r=rid?db.returns.find(x=>x.id===rid):null;
    const base=r||prefill||{};
    const opts=db.products.map(p=>`<option value="${esc(p.name)}" data-bc="${esc(p.barcode)}" data-w="${p.weight||''}">`).join('');
    openSheet(`
      <h2>${r?'Изменить возврат':'Новый возврат'}</h2>
      <label class="fl">Название товара</label>
      <input class="inp" id="r-name" list="prodlist" value="${esc(base.name||'')}" placeholder="Название товара">
      <datalist id="prodlist">${opts}</datalist>
      <label class="fl">Штрих-код</label>
      <input class="inp mono" id="r-bc" inputmode="numeric" value="${esc(base.barcode||'')}">
      <div class="two">
        <div><label class="fl">Вес 1 шт, кг</label><input class="inp mono" id="r-w" inputmode="decimal" value="${base.weight?fmtKg(base.weight):''}" placeholder="0,2"></div>
        <div><label class="fl">Количество, шт</label><input class="inp mono" id="r-qty" inputmode="numeric" value="${r?r.qty:1}"></div>
      </div>
      <div id="r-total" style="font-size:13.5px;color:var(--soft);font-weight:600;margin-top:11px"></div>
      <label class="fl">Статус</label>
      <div class="seg" id="r-seg">
        ${[['repair','На ремонт'],['done','После ремонта'],['parts','Запчасти']].map(([k,t])=>`<button data-v="${k}" class="${(r?r.status:'repair')===k?'on':''}">${t}</button>`).join('')}
      </div>
      <button class="save" id="r-save">${r?'Сохранить':'Добавить возврат'}</button>
    `);
    let status=r?r.status:'repair';
    $('#r-seg').querySelectorAll('button').forEach(b=>b.onclick=()=>{status=b.dataset.v;$('#r-seg').querySelectorAll('button').forEach(x=>x.classList.toggle('on',x===b));});
    $('#r-name').onchange=e=>{const o=[...document.querySelectorAll('#prodlist option')].find(x=>x.value===e.target.value);if(o){if(!$('#r-bc').value)$('#r-bc').value=o.dataset.bc;if(!$('#r-w').value&&o.dataset.w)$('#r-w').value=(+o.dataset.w).toLocaleString('ru-RU');updTotal();}};
    const updTotal=()=>{const w=num($('#r-w').value),q=+$('#r-qty').value||0;$('#r-total').textContent=(w>0&&q>0)?`Общий вес: ${fmtKg(w*q)} кг`:'';};
    $('#r-w').oninput=updTotal; $('#r-qty').oninput=updTotal; updTotal();
    $('#r-save').onclick=()=>{
      const name=$('#r-name').value.trim(); if(!name)return alert('Укажите товар');
      const o={name,barcode:$('#r-bc').value.trim(),weight:num($('#r-w').value),qty:+$('#r-qty').value||1,status};
      if(r)Object.assign(r,o); else db.returns.unshift({id:id(),date:Date.now(),...o});
      save();closeSheet();render();
    };
  }

  function openShip(sid){
    const s=sid?db.shipments.find(x=>x.id===sid):null;
    let items=s?JSON.parse(JSON.stringify(s.items)):[];
    const opts=db.products.map(p=>`<option value="${esc(p.name)}" data-bc="${esc(p.barcode)}" data-w="${p.weight||''}">`).join('');
    let status=s?s.status:'assembling';
    function draw(keep){
      const itemsW=sum(items,i=>(+i.qty||0)*(+i.weight||0));
      openSheet(`
        <h2>${s?'Изменить фуру':'Новая фура'}</h2>
        <div class="two">
          <div><label class="fl">Город</label><input class="inp" id="s-city" value="${s?esc(s.city):''}" placeholder="Тула"></div>
          <div><label class="fl">Номер машины</label><input class="inp mono" id="s-truck" value="${s?esc(s.truck):''}" placeholder="А123ВС 71"></div>
        </div>
        <div class="two">
          <div><label class="fl">Дата отправки</label><input class="inp" type="date" id="s-depart" value="${s?(s.depart||''):''}"></div>
          <div><label class="fl">Водитель</label><input class="inp" id="s-driver" value="${s?esc(s.driver||''):''}" placeholder="Имя"></div>
        </div>
        <label class="fl">Статус</label>
        <div class="seg" id="s-seg">
          <button data-v="assembling" class="${status==='assembling'?'on':''}">На сборке</button>
          <button data-v="ready" class="${status==='ready'?'on':''}">Готова</button>
        </div>
        <label class="fl">Товары в фуре${itemsW>0?' · '+fmtKg(itemsW)+' кг':''}</label>
        <div id="s-items">${items.length?items.map((i,idx)=>`<div class="ship-item"><span class="nm">${esc(i.name)}<small>ШК: ${esc(i.barcode)||'—'}${i.weight?' · '+fmtKg((+i.qty||0)*(+i.weight||0))+' кг':''}</small></span><span class="q mono">${i.qty} шт</span><span class="x" data-rm="${idx}">×</span></div>`).join(''):'<div style="color:var(--soft);font-size:13px;padding:4px 2px 8px">Пока пусто</div>'}</div>
        <label class="fl">Добавить товар</label>
        <input class="inp" id="s-iname" list="prodlist2" placeholder="Название товара"><datalist id="prodlist2">${opts}</datalist>
        <div class="two" style="margin-top:10px;align-items:flex-end">
          <div><input class="inp mono" id="s-ibc" inputmode="numeric" placeholder="Штрих-код (ШК)"></div>
          <div style="flex:0 0 84px"><input class="inp mono" id="s-iqty" inputmode="numeric" placeholder="шт" value="1"></div>
          <button class="mini" id="s-add" style="flex:0 0 52px;height:50px;font-size:24px">＋</button>
        </div>
        <button class="save" id="s-save">${s?'Сохранить':'Создать фуру'}</button>
      `);
      if(keep){ $('#s-city').value=keep.c;$('#s-truck').value=keep.t;$('#s-driver').value=keep.d;$('#s-depart').value=keep.dep||''; }
      $('#s-seg').querySelectorAll('button').forEach(b=>b.onclick=()=>{status=b.dataset.v;$('#s-seg').querySelectorAll('button').forEach(x=>x.classList.toggle('on',x===b));});
      $('#s-iname').onchange=e=>{const o=[...document.querySelectorAll('#prodlist2 option')].find(x=>x.value===e.target.value);if(o)$('#s-ibc').value=o.dataset.bc;};
      $('#s-add').onclick=()=>{const n=$('#s-iname').value.trim();const q=+$('#s-iqty').value||0;if(!n||q<=0)return alert('Укажите товар и количество');const bcv=$('#s-ibc').value.trim();const prod=db.products.find(x=>(bcv&&x.barcode===bcv)||x.name===n);const w=prod?(+prod.weight||0):0;items.push({name:n,barcode:bcv,qty:q,weight:w});draw({c:$('#s-city').value,t:$('#s-truck').value,d:$('#s-driver').value,dep:$('#s-depart').value});};
      document.querySelectorAll('[data-rm]').forEach(b=>b.onclick=()=>{items.splice(+b.dataset.rm,1);draw({c:$('#s-city').value,t:$('#s-truck').value,d:$('#s-driver').value,dep:$('#s-depart').value});});
      $('#s-save').onclick=()=>{
        const city=$('#s-city').value.trim(); if(!city)return alert('Укажите город');
        if(s){ s.items.forEach(it=>adjustStock(it,1)); }      // вернуть старое
        items.forEach(it=>adjustStock(it,-1));                // списать новое
        const o={city,truck:$('#s-truck').value.trim(),driver:$('#s-driver').value.trim(),depart:$('#s-depart').value,items,status};
        if(s)Object.assign(s,o); else db.shipments.unshift({id:id(),date:Date.now(),...o});
        save();closeSheet();render();
      };
    }
    draw();
  }

  render();
  cloudLoadWarehouse().finally(()=>{ runDiag(); });
</script>
