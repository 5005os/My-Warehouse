<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>СКЛАД ЦОЙ</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f0f0f0; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input, button { width: 100%; padding: 10px; margin-bottom: 10px; box-sizing: border-box; }
        button { background: #FF5A1F; color: white; border: none; font-weight: bold; cursor: pointer; }
        .item { border-bottom: 1px solid #eee; padding: 10px 0; display: flex; justify-content: space-between; }
        #status { text-align: center; margin-bottom: 10px; font-weight: bold; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align:center">СКЛАД ЦОЙ</h2>
    
    <!-- Экран входа -->
    <div id="login-screen">
        <input type="text" id="login" placeholder="Логин (Николай)">
        <input type="password" id="pass" placeholder="Пароль (Цой2026)">
        <button onclick="doLogin()">Войти</button>
        <p id="error" style="color:red; text-align:center"></p>
    </div>

    <!-- Экран склада -->
    <div id="app-screen" class="hidden">
        <div id="status">Подключение...</div>
        <hr>
        <h3>Добавить товар:</h3>
        <input type="text" id="new-name" placeholder="Название товара">
        <input type="number" id="new-qty" placeholder="Количество">
        <button onclick="addProduct()">Сохранить на сервер</button>
        
        <h3>Список товаров:</h3>
        <div id="list"></div>
    </div>
</div>

<script type="module">
    import PocketBase from 'https://cdn.jsdelivr.net/npm/pocketbase@0.21.0/+esm';
    
    // Твой сервер
    const pb = new PocketBase('http://mytest1234test1234.ru');
    
    let db = { products: [] };
    let docId = null;

    // Вход
    window.doLogin = function() {
        const l = document.getElementById('login').value;
        const p = document.getElementById('pass').value;
        
        // Простая проверка (как ты просил)
        if ((l === 'Николай' && p === 'Цой2026') || (l === 'Аза' && p === '909010')) {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('app-screen').classList.remove('hidden');
            initApp();
        } else {
            document.getElementById('error').innerText = "Неверный логин или пароль";
        }
    };

    // Запуск приложения
    async function initApp() {
        try {
            // Пытаемся получить данные
            const list = await pb.collection('warehouse').getList(1, 1);
            
            if (list.items.length > 0) {
                docId = list.items[0].id;
                db = JSON.parse(list.items[0].data || '{}');
                if (!db.products) db.products = [];
            } else {
                // Если базы нет, создаем её
                const record = await pb.collection('warehouse').create({ data: JSON.stringify(db) });
                docId = record.id;
            }
            
            document.getElementById('status').innerText = "✅ Сервер подключен!";
            document.getElementById('status').style.color = "green";
            render();
        } catch (e) {
            document.getElementById('status').innerText = "❌ Ошибка сервера: " + e.message;
            console.error(e);
        }
    }

    // Добавление товара
    window.addProduct = async function() {
        const name = document.getElementById('new-name').value;
        const qty = document.getElementById('new-qty').value;
        
        if (!name) return alert("Введите название!");
        
        db.products.push({ name: name, qty: qty });
        
        try {
            await pb.collection('warehouse').update(docId, { data: JSON.stringify(db) });
            document.getElementById('new-name').value = '';
            document.getElementById('new-qty').value = '';
            render();
        } catch (e) {
            alert("Ошибка сохранения: " + e.message);
        }
    };

    // Отрисовка списка
    function render() {
        const listDiv = document.getElementById('list');
        listDiv.innerHTML = '';
        db.products.forEach(p => {
            listDiv.innerHTML += `<div class="item"><b>${p.name}</b> <span>${p.qty} шт.</span></div>`;
        });
    }
</script>

</body>
</html>
